name = "fluffy-octo-fortnight"
main = "worker.js"
compatibility_date = "2026-01-01"

# Environment variables
[vars]
ENABLE_TURNSTILE = "false"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Secrets (set with: wrangler secret put TURNSTILE_SECRET_KEY)
# TURNSTILE_SECRET_KEY = "your_secret_key"

# Workers configuration
workers_dev = true
route = ""
zone_id = ""

# Usage model
usage_model = "bundled"
